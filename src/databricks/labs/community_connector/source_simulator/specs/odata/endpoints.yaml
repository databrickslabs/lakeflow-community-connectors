# OData v4 connector — simulated service.
#
# The connector is generic across OData v4 services, so the simulator
# stands up a small Northwind-shaped service: a fixed ``$metadata``
# document declaring two entity sets (Customers, Orders) and the
# corresponding entity-set endpoints.
#
# Custom handlers do the heavy lifting because OData's query semantics
# (``$top``, ``$skip``, ``$filter``, ``$orderby``, ``@odata.nextLink``)
# don't map onto the declarative param-role pipeline; see
# ``handlers/entity_set.py`` for the implementation.
#
# Service URL the tests use:
#   https://example.com/V4/Northwind/Northwind.svc/
# All paths below sit under that root.

endpoints:
  - path: "/V4/Northwind/Northwind.svc/$metadata"
    method: GET
    handler: databricks.labs.community_connector.source_simulator.specs.odata.handlers.metadata:serve_metadata

  - path: "/V4/Northwind/Northwind.svc/Customers"
    method: GET
    corpus: Customers
    handler: databricks.labs.community_connector.source_simulator.specs.odata.handlers.entity_set:serve_entity_set

  - path: "/V4/Northwind/Northwind.svc/Orders"
    method: GET
    corpus: Orders
    handler: databricks.labs.community_connector.source_simulator.specs.odata.handlers.entity_set:serve_entity_set
    # Inject future-dated clones of the tail record so the connector's
    # ``OrderDate le _init_ts`` cap is exercised. Without the cap, the
    # connector would chase these forever and test_read_terminates would
    # never converge.
    synthesize_future_records:
      cursor_field: OrderDate
      count: 3
