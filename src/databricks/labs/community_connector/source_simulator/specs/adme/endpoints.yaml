# Azure Data Manager for Energy (ADME) — OSDU Search Service.
#
# Connector flow:
#   1. POST https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token
#      → returns a stub Bearer token.
#   2. POST {instance_url}/api/search/v2/query_with_cursor
#      → JSON body specifies kind / Lucene query / cursor / limit.
#      The body shape doesn't fit the declarative param-role pipeline,
#      so this endpoint uses a custom handler that:
#        * routes to the right corpus by ``kind`` (Wellbore / Reservoir /
#          Sample → Rock_and_Fluid),
#        * filters by ``modifyTime:[since TO until]`` Lucene range,
#        * paginates with an opaque cursor,
#        * synthesizes a few future-dated records on top of the corpus
#          to exercise the connector's init-time cap (the cap test
#          mirrors what ``synthesize_future_records:`` does for
#          declarative endpoints).
#
# Every other ADME endpoint (Storage, Schema, etc.) is out of scope for
# Phase 1; the connector only hits Search.

endpoints:
  # ---- Azure AD client-credentials token endpoint ----
  - path: /{tenant_id}/oauth2/v2.0/token
    method: POST
    handler: databricks.labs.community_connector.source_simulator.specs.adme.handlers.search:oauth_token

  # ---- OSDU Search Service (cursor pagination) ----
  #
  # Future-record synthesis (the equivalent of the declarative
  # ``synthesize_future_records:`` directive) is implemented inside the
  # handler at ``handlers/search.py::_augment_with_future`` — it appends a
  # few future-dated ``modifyTime`` clones on top of the corpus so the
  # connector's ``_init_time`` cap is actually exercised by
  # ``test_microbatch_offset_convergence``. The declarative directive
  # doesn't fit here because the request body shape (kind / Lucene /
  # opaque cursor) isn't captured by the declarative param-role
  # pipeline.
  - path: /api/search/v2/query_with_cursor
    method: POST
    handler: databricks.labs.community_connector.source_simulator.specs.adme.handlers.search:query_with_cursor
