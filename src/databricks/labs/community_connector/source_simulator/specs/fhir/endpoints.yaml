# FHIR R4 server.
#
# Standard search response is a "Bundle" resource:
#   {"resourceType": "Bundle", "type": "searchset", "entry": [...], "link": [...]}
# Empty entry array → connector terminates.

endpoints:
  - path: /fhir/Patient
    method: GET
    corpus: __patient_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Observation
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Condition
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Encounter
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Procedure
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/MedicationRequest
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/DiagnosticReport
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/AllergyIntolerance
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Immunization
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Coverage
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/CarePlan
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Goal
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/Device
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
  - path: /fhir/DocumentReference
    method: GET
    corpus: __empty_bundle__
    response: {pagination_style: none, single_entity: true}
