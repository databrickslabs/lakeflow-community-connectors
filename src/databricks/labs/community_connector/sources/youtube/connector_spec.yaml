# youtube Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.
#
# Authentication:
#   - api_key: public data (channels by id, playlists, videos, search)
#   - oauth: private/mine data via a Unity Catalog COMMUNITY u2m connection.
#     The user supplies client_id + client_secret; Databricks runs the OAuth
#     flow and injects a short-lived access_token at query time.

# ============================================================================
# Display name (required for Databricks to show connection parameter prompts)
# ============================================================================
display_name: YouTube

# ============================================================================
# Connection Parameters
# Provide ONE authentication method (api_key or oauth).
# ============================================================================
connection:
  auth_methods:
    - name: api_key
      description: >
        Authenticate with a YouTube Data API v3 key from Google Cloud Console.
        Use for public data (channels by id, playlists, videos, search).
      parameters:
        - name: api_key
          type: string
          required: true
          secret: true
          description: >
            YouTube Data API v3 key from Google Cloud Console.

    - name: oauth
      description: >
        Authenticate with OAuth 2.0 via a Unity Catalog COMMUNITY connection
        (u2m flow). Required for mine=true, subscriptions, and other private
        data. Supply client_id and client_secret; authorization happens
        through the connection UI and a short-lived access_token is injected
        at query time.
      parameters:
        - name: client_id
          type: string
          required: true
          secret: true
          description: >
            OAuth 2.0 client ID from Google Cloud Console (Web application).

        - name: client_secret
          type: string
          required: true
          secret: true
          description: >
            OAuth 2.0 client secret issued alongside the client_id.

  # OAuth 2.0 authorization-code flow (see Gmail connector for the shape).
  #   flow — u2m: a single human authorizes once at connection creation.
  #   pkce — false: Google's Web-application client is confidential and does
  #          not require PKCE for the labs authenticate CLI.
  oauth:
    flow: u2m
    pkce: false
    scopes: https://www.googleapis.com/auth/youtube.readonly
    authorization_url: https://accounts.google.com/o/oauth2/v2/auth
    token_url: https://oauth2.googleapis.com/token
    extra_auth_params:
      access_type: offline
      prompt: consent

# ============================================================================
# External Options Allowlist
# Table-specific options read by the connector (channels, playlists, playlist_items,
# videos, search, activities, comment_threads, subscriptions, video_categories). Include this
# comma-separated list in the UC connection's externalOptionsAllowList so
# Databricks can pass them through to the connector.
# ============================================================================
external_options_allowlist: "channel_id,channel_ids,chart,for_username,max_pages,max_results,mine,order,playlist_id,playlist_ids,published_after,q,region_code,type,video_category_id,video_id,video_ids"
