display_name: Qualys VMDR
connection:
  parameters:
    - name: username
      type: string
      required: true
      secret: true
      description: Qualys username for VMDR APIs.
    - name: password
      type: string
      required: true
      secret: true
      description: Qualys password for VMDR APIs.
    - name: base_url
      type: string
      required: false
      description: Qualys API base URL. Defaults to https://qualysapi.qualys.com.
    - name: timeout_seconds
      type: string
      required: false
      description: HTTP timeout in seconds. Default 30.
external_options_allowlist: "start_date,cursor_after"
