# Notion Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.

# ============================================================================
# Display name (required for Databricks to show connection parameter prompts)
# ============================================================================
display_name: Notion

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# ============================================================================
connection:
  parameters:
    - name: api_key
      type: string
      required: true
      secret: true
      description: >
        Notion Internal Integration Token for API authentication.
        Generate this from https://www.notion.so/my-integrations by creating
        a new integration and copying the token from the Secrets section.
        The integration must have the required capabilities enabled:
        Read content, Read user information, and Read comments.
        All Notion pages and databases that will be accessed must be
        explicitly shared with this integration.

# ============================================================================
# External Options Allowlist
# These table-specific options must be included in the externalOptionsAllowList
# parameter of the UC connection to allow them to be passed through.
# Use a comma-separated string of option names.
# If no table-specific options are needed, set to empty string.
# ============================================================================
external_options_allowlist: ""
