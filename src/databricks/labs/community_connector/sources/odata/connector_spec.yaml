# odata Community Connector Spec
# Connection-level options live here; table-level options must appear in
# external_options_allowlist so the pipeline can pass them through.

display_name: OData
connection:
  auth_methods:
    - name: bearer
      description: >
        Bearer token in the Authorization header. Works for most modern OData
        APIs (Microsoft Graph, Dynamics 365, SAP S/4HANA Cloud).
      parameters:
        - name: token
          type: string
          required: true
          secret: true
          description: Bearer access token.

    - name: basic
      description: >
        HTTP Basic. Common for on-prem SAP NetWeaver / Gateway OData services.
      parameters:
        - name: username
          type: string
          required: true
          description: Username.
        - name: password
          type: string
          required: true
          secret: true
          description: Password.

    - name: api_key
      description: >
        API key delivered in a custom header. Header name defaults to
        ``x-api-key`` but can be overridden via ``api_key_header``.
      parameters:
        - name: api_key
          type: string
          required: true
          secret: true
          description: API key value.
        - name: api_key_header
          type: string
          required: false
          description: Header name to carry the API key. Default ``x-api-key``.

    - name: oauth2
      description: >
        OAuth 2.0. Two grant flows are supported via the same parameter
        set:

          1. **Client credentials** (server-to-server). Provide
             ``oauth2_token_url``, ``oauth2_client_id``,
             ``oauth2_client_secret``. The connector mints a fresh
             access token at session start.

          2. **Authorization code with refresh** (user-delegated).
             Additionally supply ``oauth2_refresh_token`` and optionally
             ``oauth2_access_token``. The pre-supplied access token is
             used as-is when present; when it expires (HTTP 401 from
             the source), the connector POSTs ``grant_type=refresh_token``
             to ``oauth2_token_url`` to mint a fresh one. Providers that
             rotate refresh tokens have the new value tracked in-process
             for the duration of the run.
      parameters:
        - name: oauth2_token_url
          type: string
          required: true
          description: Token endpoint URL.
        - name: oauth2_client_id
          type: string
          required: true
          description: OAuth2 client id.
        - name: oauth2_client_secret
          type: string
          required: true
          secret: true
          description: OAuth2 client secret.
        - name: oauth2_scope
          type: string
          required: false
          description: Optional scope string.
        - name: oauth2_access_token
          type: string
          required: false
          secret: true
          description: >
            Pre-issued access token from the authorization-code flow.
            Used directly until the source returns 401, then refreshed
            via ``oauth2_refresh_token``. Omit for the client-credentials
            flow — the connector mints one itself.
        - name: oauth2_refresh_token
          type: string
          required: false
          secret: true
          description: >
            Long-lived refresh token from the authorization-code flow.
            When set, the connector uses the ``refresh_token`` grant to
            re-mint the access token on expiry. Required for the
            authorization-code flow; omit for client credentials.

  parameters:
    - name: service_url
      type: string
      required: true
      description: >
        OData v4 service root URL, e.g.
        ``https://services.odata.org/V4/Northwind/Northwind.svc/``.

    - name: timeout_seconds
      type: string
      required: false
      description: >
        HTTP timeout per request (seconds). Default 180 (3 min). Deep
        ``expand_contained=true`` chains can take longer than the
        previous 60s default to materialise server-side; the new
        default fits typical 3-segment reads. Raise further for
        4+-segment expansions or very large source tables.

    - name: metadata_cache_ttl_seconds
      type: string
      required: false
      description: >
        TTL for the on-disk ``$metadata`` pickle cache (seconds). The
        cache lets forked PySpark Python Data Source workers share one
        fetch + parse during pipeline INITIALIZING. Default 60. Set to
        ``0`` to disable file caching entirely; raise for stable
        schemas where you want to skip even the first-fork fetch over
        a longer window.

    - name: max_retries
      type: string
      required: false
      description: >
        Retry budget for transient HTTP 429 (throttling) and 503
        (service unavailable) responses. Default 5. Set to ``0`` to
        disable retries (any 429/503 surfaces immediately as
        RuntimeError).

    - name: retry_max_delay_seconds
      type: string
      required: false
      description: >
        Cap on a single retry sleep (seconds). Default 60. Honours
        ``Retry-After`` from the server when present, falling back to
        exponential backoff (1, 2, 4, 8, 16 …); either way never
        sleeps longer than this — protects against misbehaving servers
        emitting hour-long ``Retry-After`` values that would pin a
        Spark task.

    - name: extra_headers
      type: string
      required: false
      description: >
        Extra request headers as ``Key:Value,Key2:Value2``. Useful for tenant
        IDs, CSRF tokens, etc.

    - name: verbose_http_logging
      type: string
      required: false
      description: >
        When ``"true"``, emit one INFO log line per HTTP request (URL)
        and one per response (status + first N chars of body) to the
        ``databricks.labs.community_connector.sources.odata.odata``
        Python logger. Used for triaging silent partial-data,
        under-row-count, or "why am I missing rows" problems against
        flaky sources. **Source data ends up in the log stream** when
        enabled — turn it on only for diagnostics. Retries and JSON
        decode failures always log at WARNING/ERROR regardless of this
        flag. Default ``false``.

    - name: verbose_http_log_body_chars
      type: string
      required: false
      description: >
        Cap on the response body snippet length included in each INFO
        log line when ``verbose_http_logging`` is on. Default 500. Raise
        for richer diagnostics or lower to cut log volume on
        high-throughput pipelines.

# Per-table options the pipeline may pass through.
external_options_allowlist: "namespace,cursor_field,select,filter,filter_at_*,page_size,max_records_per_batch,cursor_nulls,delta_tracking,expand_contained,num_partitions,pagination,exclude_ancestor_columns,cursor_lookback_seconds,cursor_lookback_factor,cursor_lookback_max_seconds,cursor_probe,contained_fetch"
