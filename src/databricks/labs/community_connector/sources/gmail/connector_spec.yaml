# Gmail Community Connector Spec
#
# This connector is designed for the Unity Catalog COMMUNITY connection
# with one of the U2M OAuth flows (single-user or per-end-user). The
# connection layer owns the OAuth dance (authorization code + PKCE,
# token exchange, per-user refresh in u2m_per_user mode) and injects a
# valid bearer ``access_token`` into the connector's options at query
# time. The connector treats the token as opaque.
#
# Required oauth_scope on the connection (request both at consent time):
#   - https://www.googleapis.com/auth/gmail.readonly
#   - https://www.googleapis.com/auth/drive.readonly
#
# The Drive scope is required by the download_attachment agent operation
# to fetch Drive-hosted attachments — Gmail rewrites attachments over
# 25 MB or shared-via-Drive as Drive links rather than inlining them.
# Without drive.readonly, download_attachment surfaces permission_denied
# on those links.
#
# Recommended connection creation (via the community-connector CLI):
#
#   community-connector create-connection \
#     --name gmail_connector \
#     --source-name gmail \
#     --auth-type u2m \
#     --options '{
#       "client_id": "<oauth-client-id>.apps.googleusercontent.com",
#       "client_secret": "<oauth-client-secret>",
#       "authorization_endpoint": "https://accounts.google.com/o/oauth2/v2/auth",
#       "token_endpoint": "https://oauth2.googleapis.com/token",
#       "oauth_scope": "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/drive.readonly"
#     }'
#
# Provides 100% Gmail API coverage across 10 tables plus a Gmail-specific
# ingestion-agent operation set (preview_table override, search_messages,
# get_message, list_attachments, download_attachment).

display_name: Gmail
connection:
  parameters:
    - name: access_token
      type: string
      required: true
      secret: true
      description: >
        OAuth 2.0 bearer access token for Gmail + Drive APIs. Supplied
        automatically by the Unity Catalog COMMUNITY connection's u2m or
        u2m_per_user OAuth flow — do not set this manually unless you
        know the upstream connection has already exchanged the user's
        authorization grant for a token.

    - name: user_id
      type: string
      required: false
      description: >
        Gmail user identifier the connector reads against. Defaults to
        'me' (the user the access_token was issued to). Service-account
        workflows with domain-wide delegation can specify a target user
        email here.

  # OAuth defaults: standard RFC 6749 fields that are fixed for Google's
  # identity provider. The community-connector CLI auto-fills these when
  # --auth-type is m2m / u2m / u2m_per_user, so the user only needs to
  # supply client_id and client_secret (their app registration). Override
  # any of these via --options if needed (e.g. a narrower oauth_scope).
  oauth:
    authorization_endpoint: https://accounts.google.com/o/oauth2/v2/auth
    token_endpoint: https://oauth2.googleapis.com/token
    oauth_scope: https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/drive.readonly

# ============================================================================
# External Options Allowlist
# Table-specific and agent-operation options that the UC connection passes
# through to the connector at query time. Combined for read-side
# table_configuration options + agent-operation parameters.
# ============================================================================
external_options_allowlist: "q,labelIds,maxResults,includeSpamTrash,format,max_records_per_batch,after_date,before_date,newer_than,subject,from_address,to_address,label,has_attachment,is_unread,query,message_id,attachment_id,drive_file_id,volume_path,export_mime_type"

# ============================================================================
# Supported Tables (10 — 100% Gmail API coverage)
# ============================================================================
# Core Email Data:
#   - messages:              Email messages (CDC with historyId cursor)
#   - threads:               Email threads (CDC with historyId cursor)
#   - labels:                Gmail labels (snapshot)
#   - drafts:                Draft messages (snapshot)
#
# Account Information:
#   - profile:               User profile and mailbox stats (snapshot)
#
# Settings & Configuration:
#   - settings:              Combined settings (IMAP, POP, vacation, etc.)
#   - filters:               Email filter rules (snapshot)
#   - forwarding_addresses:  Forwarding destinations (snapshot)
#   - send_as:               Send-as aliases (snapshot)
#   - delegates:             Delegated access users (snapshot)

# ============================================================================
# Ingestion-Agent Operations (dispatched via operation=<name> on the format)
# ============================================================================
# Built-in (framework):
#   - list_objects
#   - get_object_metadata
#   - validate_connection
#   - list_operations
#
# Gmail-specific:
#   - preview_table (override): typed filters compose into Gmail q syntax
#     for messages/threads (after_date, before_date, newer_than, subject,
#     from_address, to_address, label, has_attachment, is_unread, query).
#   - search_messages: lightweight header-only triage (format=metadata).
#   - get_message: single-message fetch with decoded body_text/html and
#     Drive file IDs extracted from the body.
#   - list_attachments: gmail-native and Drive-hosted attachments per
#     message.
#   - download_attachment: write attachment bytes to a /Volumes/ path
#     using attachment_id (Gmail) or drive_file_id (Drive).

# ============================================================================
# Table Configuration Options
# ============================================================================
# q:               Gmail search query (same syntax as Gmail web UI)
# labelIds:        Filter by label ID (e.g., INBOX, SENT, DRAFT, SPAM, TRASH)
# maxResults:      Maximum items per page (default: 100, max: 500)
# includeSpamTrash: Include messages from SPAM and TRASH folders ("true"/"false")
# format:          Message format — "full" (default), "metadata", "minimal", "raw"
