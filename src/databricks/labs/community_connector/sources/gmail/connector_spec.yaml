# Gmail Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.
#
# The connector performs its own OAuth 2.0 refresh in code: it exchanges a
# long-lived refresh_token (plus client_id + client_secret) at Google's
# token endpoint for short-lived access tokens at query time. Supply all
# three as connection parameters.
#
# Required scopes (request BOTH at consent time on a single refresh token):
#   - https://www.googleapis.com/auth/gmail.readonly
#   - https://www.googleapis.com/auth/drive.readonly
#
# The Drive scope is required by the download_attachment agent operation
# to fetch Drive-hosted attachments — Gmail rewrites attachments over
# 25 MB or shared-via-Drive as Drive links rather than inlining them.
# Without drive.readonly, download_attachment surfaces permission_denied
# on those links.
#
# Provides 100% Gmail API coverage across 10 tables plus a Gmail-specific
# ingestion-agent operation set (read_table override, search_messages,
# get_message, list_attachments, download_attachment).

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# ============================================================================
display_name: Gmail
connection:
  parameters:
    - name: client_id
      type: string
      required: true
      secret: true
      description: >
        OAuth 2.0 client ID from Google Cloud Console.
        Create this in APIs & Services → Credentials → OAuth 2.0 Client IDs.

    - name: client_secret
      type: string
      required: true
      secret: true
      description: >
        OAuth 2.0 client secret from Google Cloud Console.
        Obtained alongside the client_id when creating OAuth credentials.

    - name: refresh_token
      type: string
      required: true
      secret: true
      description: >
        Long-lived OAuth 2.0 refresh token obtained via the OAuth consent flow.
        Use Google OAuth Playground or implement the OAuth flow to obtain it.
        Required scopes (request BOTH at consent time on a single token):
          - https://www.googleapis.com/auth/gmail.readonly
          - https://www.googleapis.com/auth/drive.readonly
        The Drive scope is required for the download_attachment agent
        operation to fetch Drive-hosted attachments (>25 MB or files
        attached via Drive sharing). Read-only ingestion of Gmail tables
        works with gmail.readonly alone, but agent download operations
        will return permission_denied if the Drive scope is missing.

    - name: user_id
      type: string
      required: false
      description: >
        The user's email address or 'me' for the authenticated user.
        Defaults to 'me' if not specified. For service accounts with
        domain-wide delegation, specify the user email to impersonate.

# ============================================================================
# External Options Allowlist
# These table-specific options must be included in the externalOptionsAllowList
# parameter of the UC connection to allow them to be passed through.
# Use a comma-separated string of option names.
# ============================================================================
external_options_allowlist: "q,labelIds,maxResults,includeSpamTrash,format,max_records_per_batch,after_date,before_date,newer_than,subject,from_address,to_address,label,has_attachment,is_unread,query,message_id,attachment_id,drive_file_id,volume_path,export_mime_type"

# ============================================================================
# Supported Tables (10 tables - 100% Gmail API coverage)
# ============================================================================
# Core Email Data:
#   - messages:              Email messages (CDC with historyId cursor)
#   - threads:               Email threads (CDC with historyId cursor)
#   - labels:                Gmail labels (snapshot)
#   - drafts:                Draft messages (snapshot)
#
# Account Information:
#   - profile:               User profile and mailbox stats (snapshot)
#
# Settings & Configuration:
#   - settings:              Combined settings (IMAP, POP, vacation, etc.)
#   - filters:               Email filter rules (snapshot)
#   - forwarding_addresses:  Forwarding destinations (snapshot)
#   - send_as:               Send-as aliases (snapshot)
#   - delegates:             Delegated access users (snapshot)

# ============================================================================
# Ingestion-Agent Operations (dispatched via operation=<name> on the format)
# ============================================================================
# Built-in (framework):
#   - list_objects
#   - get_object_metadata
#   - validate_connection
#   - list_operations
#
# Gmail-specific:
#   - read_table (override): typed filters compose into Gmail q syntax
#     for messages/threads (after_date, before_date, newer_than, subject,
#     from_address, to_address, label, has_attachment, is_unread, query).
#     Default cap 50 rows; set maxResults=N, or maxResults=-1 for unlimited.
#   - search_messages: lightweight header-only triage (format=metadata).
#   - get_message: single-message fetch with decoded body_text/html and
#     Drive file IDs extracted from the body.
#   - list_attachments: gmail-native and Drive-hosted attachments per
#     message.
#   - download_attachment: write attachment bytes to a /Volumes/ path
#     using attachment_id (Gmail) or drive_file_id (Drive).

# ============================================================================
# Table Configuration Options
# ============================================================================
# q:               Gmail search query (same syntax as Gmail web UI)
#                  Example: "newer_than:7d", "from:user@example.com"
#
# labelIds:        Filter by label ID (e.g., INBOX, SENT, DRAFT, SPAM, TRASH)
#                  For user labels, use the label ID (e.g., Label_1)
#
# maxResults:      Maximum items per page (default: 100, max: 500)
#
# includeSpamTrash: Include messages from SPAM and TRASH folders
#                   Values: "true" or "false" (default: "false")
#
# format:          Message format to retrieve
#                  Values: "full" (default), "metadata", "minimal", "raw"
#                  - full: Returns full email content including body
#                  - metadata: Returns only headers, no body
#                  - minimal: Returns only id and threadId
#                  - raw: Returns full email in RFC 2822 format (base64)

