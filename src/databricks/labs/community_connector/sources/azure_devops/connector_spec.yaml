# azure_devops Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# ============================================================================
display_name: Azure DevOps
connection:
  parameters:
    - name: organization
      type: string
      required: true
      description: >
        Azure DevOps organization name. This is the organization segment
        in the URL: https://dev.azure.com/{organization}.

    - name: project
      type: string
      required: false
      description: >
        Project name or ID. If provided, scopes Git and Work Item
        operations to this project. If omitted, tables can fetch from
        all projects in the organization.

    - name: auth_mode
      type: string
      required: false
      description: >
        Authentication mode: "pat" (default) for a Personal Access Token,
        or "oauth" for a Microsoft Entra ID service principal using the
        OAuth 2.0 client-credentials flow.

    - name: personal_access_token
      type: string
      required: false
      secret: true
      description: >
        Personal Access Token (PAT) for the Azure DevOps Services REST
        API. Required when auth_mode="pat". Required scopes: Code (read),
        Graph (read), Project and Team (read), Work Items (read).

    - name: tenant_id
      type: string
      required: false
      description: >
        Microsoft Entra ID tenant (directory) ID. Required when
        auth_mode="oauth".

    - name: client_id
      type: string
      required: false
      description: >
        Entra ID service principal (application) client ID. Required when
        auth_mode="oauth". The service principal must be added to the Azure
        DevOps organization with the required read access.

    - name: client_secret
      type: string
      required: false
      secret: true
      description: >
        Client secret for the Entra ID service principal. Required when
        auth_mode="oauth".

# ============================================================================
# External Options Allowlist
# These table-specific options must be included in the externalOptionsAllowList
# parameter of the UC connection to allow them to be passed through.
# Use a comma-separated string of option names.
# ============================================================================
external_options_allowlist: "project,repository_id,pullrequest_id,status_filter,filter,ids"
