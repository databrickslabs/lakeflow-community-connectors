name: Pylint

# Trigger model. CI needs the GitHub OIDC token because the protected
# runner group's only egress to PyPI is the JFrog proxy
# (.github/actions/configure-jfrog-pypi), and the proxy authenticates by
# exchanging an OIDC ID token for a JFrog access token. Plain
# `pull_request` events from forks don't receive OIDC, so we can't use
# that trigger for fork PRs at all.
#
# Naively using `pull_request_target` for every PR event would give
# fork-controlled code the OIDC token — the classic "pwn request"
# footgun (GitHub Security Lab). H1 #3730634 (PR #188) exploited that.
#
# So: a single `pull_request_target` trigger for all PR events, with a
# job-level `if` that decides what actually runs:
#
#   * push to master           — always runs.
#   * same-repo PR (any event) — runs.
#   * fork PR opened/sync/etc. — skipped (no fork code executes).
#   * fork PR labeled          — runs *only* if the added label is
#                                `safe-to-test`. That label is the
#                                reviewer's "I read this diff; it's safe
#                                to execute on the runner" signal. The
#                                label auto-strips on every subsequent
#                                push (strip-safe-to-test.yml) so each
#                                new commit re-requires approval.
#
# The explicit head-SHA checkout is the SHA the reviewer just labeled —
# i.e. the version they signed off on.
on:
  push:
    branches: [master]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements/**'
      - '.github/workflows/pylint.yml'
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements/**'
      - '.github/workflows/pylint.yml'

permissions:
  contents: read
  id-token: write  # Required for JFrog OIDC token exchange (see .github/actions/configure-jfrog-pypi).

jobs:
  build:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - name: Authorize
      env:
        EVENT_NAME: ${{ github.event_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        BASE_REPO: ${{ github.repository }}
        HAS_SAFE_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'safe-to-test') }}
      run: |
        if [ "$EVENT_NAME" = "push" ]; then
          echo "OK: push to master."
          exit 0
        fi
        if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
          echo "OK: same-repo PR ($HEAD_REPO)."
          exit 0
        fi
        if [ "$HAS_SAFE_LABEL" = "true" ]; then
          echo "OK: fork PR with safe-to-test label."
          exit 0
        fi
        echo "::error title=Fork PR not authorized::Apply the 'safe-to-test' label to run CI against this commit. See CONTRIBUTING.md."
        exit 1
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        # pull_request_target defaults to checking out the base ref; we want
        # to lint the PR's actual code (specifically: the SHA the reviewer
        # just labeled `safe-to-test`, or the head SHA for same-repo PRs).
        # For push events the variable is empty and checkout falls back to
        # the workflow ref.
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure pip via JFrog proxy
      uses: ./.github/actions/configure-jfrog-pypi
    - name: Install dependencies
      run: |
        LOCK="requirements/pylint.txt"
        if [ ! -f "$LOCK" ]; then
          echo "::error title=Missing lock::$LOCK is required. Run tools/scripts/regenerate-locks.sh and commit requirements/."
          exit 1
        fi
        pip install -r "$LOCK"
        pip install -e . --no-deps
        pip install -e ./tools/community_connector --no-deps
    - name: Analysing the code with pylint
      run: |
        # Lint source files (excluding tests directory and generated files).
        #
        # Disabled checks:
        #   W       — warnings (pre-existing project policy)
        #   C0114   — missing-module-docstring
        #   C0115   — missing-class-docstring
        #   C0116   — missing-function-docstring (noisy on dunders, factories,
        #             one-line helpers; module/class docstrings already cover intent)
        #   C0415   — import-outside-toplevel (deliberate lazy imports for
        #             circular-dep avoidance and to defer optional cost)
        #   R0801   — duplicate-code
        #   R0902   — too-many-instance-attributes (Simulator/EndpointSpec/
        #             LiveValidator are config-bag dataclasses)
        #   R0903   — too-few-public-methods (single-purpose helpers are fine)
        #   R0911   — too-many-return-statements (guard-clause pattern)
        #   R0913   — too-many-arguments (named kwargs on stable APIs)
        #   R0917   — too-many-positional-arguments
        #   R1705   — unnecessary-else-after-return
        pylint \
        --max-line-length=100 \
        --max-locals=25 \
        --max-branches=20 \
        --max-module-lines=1500 \
        --disable=W,C0114,C0115,C0116,C0415,R0801,R0902,R0903,R0911,R0913,R0917,R1705 \
        --ignore-long-lines='^\s*(#|f?".*"|f?'\''.*'\'')$' \
        $(git ls-files '*.py' | grep -v '_generated_' | grep -v 'pipeline-spec/example_ingest.py' | grep -v 'pipeline_spec.example.py' | grep -v 'tools/scripts/merge_python_source.py' | grep -v 'community_connector_cli/templates/ingest_template' | grep -v 'community_connector/sources/hubspot/' | grep -v 'community_connector/sources/stripe/' | grep -v 'community_connector/sources/mixpanel/' | grep -v 'microsoft_teams/sample-ingest.py' | grep -v '^tests/')
