name: Tests

# Triggers: see pull_request_target rationale in .github/workflows/pylint.yml.
#
# This workflow fires on every PR (no workflow-level paths filter) so the
# `summary` job's check_run is always reported on the PR head — branch
# protection requires `Tests / summary` and would block any PR that
# silently skipped the workflow. The `changes` job below does *granular*
# sub-test selection: downstream test-* jobs are conditional and skip
# when no relevant files changed, while `summary` still runs and
# aggregates (skipped is treated as success).
on:
  push:
    branches: [master]
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - 'requirements/**'
      - '.github/workflows/tests.yml'
  pull_request_target:
    branches: [master]
    # Default types (opened, synchronize, reopened) plus `labeled` so a
    # maintainer's `safe-to-test` add fires CI on the exact labeled SHA.
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  id-token: write  # Required for JFrog OIDC token exchange (see .github/actions/configure-jfrog-pypi).

jobs:
  # Detect which paths changed
  changes:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    outputs:
      libs: ${{ steps.check.outputs.libs }}
      pipeline: ${{ steps.check.outputs.pipeline }}
      example: ${{ steps.check.outputs.example }}
      community_connector: ${{ steps.check.outputs.community_connector }}
      sources: ${{ steps.check.outputs.sources }}
    steps:
      # First step (runs before any fork-controlled code is on disk).
      # Fork PRs only run CI when a maintainer adds the `safe-to-test`
      # label, and only on the *exact event* (`action == 'labeled' &&
      # label.name == 'safe-to-test'`) — a `synchronize` after labeling
      # does NOT pass, so the label gates the exact SHA the maintainer
      # reviewed, not whatever gets pushed afterward. (H1 #3730634
      # pwn-request gate; see CONTRIBUTING.md.)
      #
      # We do this as an explicit failing shell step rather than a job-
      # level `if:` so the workflow conclusion is `failure` (not
      # `skipped`) when unauthorized — branch protection treats `failure`
      # unambiguously, whereas `skipped` has historically been treated as
      # `success`.
      - name: Authorize
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "OK: push to master."
            exit 0
          fi
          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            echo "OK: same-repo PR ($HEAD_REPO)."
            exit 0
          fi
          if [ "$ACTION" = "labeled" ] && [ "$LABEL_NAME" = "safe-to-test" ]; then
            echo "OK: fork PR was just labeled 'safe-to-test'."
            exit 0
          fi
          echo "::error title=Fork PR not authorized::Apply (or re-apply) the 'safe-to-test' label to authorize CI on this commit. See CONTRIBUTING.md."
          exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      # cannot use dorny because of ip allowlisting
      # - uses: dorny/paths-filter@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check changed paths
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
          fi

          # Handle initial commit or force push
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          if [ -z "$BASE_SHA" ]; then
            # First commit, check all files
            CHANGED_FILES=$(git ls-files)
          else
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check libs
          if echo "$CHANGED_FILES" | grep -qE '^(src/databricks/labs/community_connector/libs/|tests/unit/libs/)'; then
            echo "libs=true" >> $GITHUB_OUTPUT
          else
            echo "libs=false" >> $GITHUB_OUTPUT
          fi

          # Check pipeline
          if echo "$CHANGED_FILES" | grep -qE '^(src/databricks/labs/community_connector/pipeline/|tests/unit/pipeline/)'; then
            echo "pipeline=true" >> $GITHUB_OUTPUT
          else
            echo "pipeline=false" >> $GITHUB_OUTPUT
          fi

          # Check example (also triggers on interface or simulated_source changes)
          if echo "$CHANGED_FILES" | grep -qE '^(src/databricks/labs/community_connector/(sources/(example|interface)/|libs/simulated_source/)|tests/unit/sources/(example/|test_suite\.py|test_utils\.py|lakeflow_connect_test_utils\.py))'; then
            echo "example=true" >> $GITHUB_OUTPUT
          else
            echo "example=false" >> $GITHUB_OUTPUT
          fi

          # Check tools/community_connector
          if echo "$CHANGED_FILES" | grep -q '^tools/community_connector/'; then
            echo "community_connector=true" >> $GITHUB_OUTPUT
          else
            echo "community_connector=false" >> $GITHUB_OUTPUT
          fi

          # Detect per-source connector changes
          # Triggers when source code, test code, or shared infra (utils.py,
          # the LakeflowConnect interface, or the shared test harness) changes.
          # Without the test-harness trigger, a PR adding a new check in
          # test_suite.py is only validated against the example connector
          # (per the `example` trigger above), leaving other connectors
          # untested until someone happens to modify their source — which
          # silently allowed corpus drift on 6 connectors to be merged
          # before PR #205 surfaced it by changing every source pyproject.
          SHARED_INFRA_CHANGED=false
          if echo "$CHANGED_FILES" | grep -qE '^(src/databricks/labs/community_connector/(libs/utils\.py|interface/)|tests/unit/sources/(test_suite\.py|test_partition_suite\.py|test_utils\.py|lakeflow_connect_test_utils\.py))$'; then
            SHARED_INFRA_CHANGED=true
          fi

          # Read exclude list into a temp file (skip comments and blank lines)
          EXCLUDE_FILE=".github/workflows/test_exclude.txt"
          EXCLUDES_TMP=$(mktemp)
          if [ -f "$EXCLUDE_FILE" ]; then
            grep -v '^\s*#' "$EXCLUDE_FILE" | grep -v '^\s*$' > "$EXCLUDES_TMP" || true
          fi

          # Find all source connector directories and check for changes
          CHANGED_SOURCES=""
          for source_dir in src/databricks/labs/community_connector/sources/*/; do
            source_name=$(basename "$source_dir")

            # Skip non-connector directories
            if [ "$source_name" = "interface" ] || [ "$source_name" = "__pycache__" ]; then
              continue
            fi

            # Check if this source's code, tests, or shared infra changed
            SOURCE_TRIGGERED=false
            if [ "$SHARED_INFRA_CHANGED" = "true" ]; then
              SOURCE_TRIGGERED=true
            elif echo "$CHANGED_FILES" | grep -qE "^src/databricks/labs/community_connector/sources/${source_name}/"; then
              SOURCE_TRIGGERED=true
            elif echo "$CHANGED_FILES" | grep -qE "^tests/unit/sources/${source_name}/"; then
              SOURCE_TRIGGERED=true
            fi

            if [ "$SOURCE_TRIGGERED" = "true" ] && [ -d "tests/unit/sources/${source_name}" ]; then
              # Check if source has at least one non-excluded test file
              HAS_RUNNABLE_TESTS=false
              for test_file in tests/unit/sources/${source_name}/test_*.py; do
                if [ -f "$test_file" ] && ! grep -qxF "$test_file" "$EXCLUDES_TMP"; then
                  HAS_RUNNABLE_TESTS=true
                  break
                fi
              done

              if [ "$HAS_RUNNABLE_TESTS" = "true" ]; then
                CHANGED_SOURCES="${CHANGED_SOURCES:+$CHANGED_SOURCES,}\"${source_name}\""
                echo "Source to test: $source_name"
              else
                echo "Skipping $source_name (all tests excluded)"
              fi
            fi
          done

          rm -f "$EXCLUDES_TMP"
          echo "sources=[${CHANGED_SOURCES}]" >> $GITHUB_OUTPUT
          echo "Sources to test: [${CHANGED_SOURCES}]"

  # Test libs
  test-libs:
    needs: changes
    if: ${{ needs.changes.outputs.libs == 'true' }}
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure pip via JFrog proxy
        uses: ./.github/actions/configure-jfrog-pypi
      - name: Install dependencies
        run: |
          LOCK="requirements/root.txt"
          if [ ! -f "$LOCK" ]; then
            echo "::error title=Missing lock::$LOCK is required. Run tools/scripts/regenerate-locks.sh and commit requirements/."
            exit 1
          fi
          pip install -r "$LOCK"
          pip install -e . --no-deps
      - name: Run libs tests
        run: |
          pytest tests/unit/libs/ -v

  # Test pipeline
  test-pipeline:
    needs: changes
    if: ${{ needs.changes.outputs.pipeline == 'true' }}
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure pip via JFrog proxy
        uses: ./.github/actions/configure-jfrog-pypi
      - name: Install dependencies
        run: |
          LOCK="requirements/root.txt"
          if [ ! -f "$LOCK" ]; then
            echo "::error title=Missing lock::$LOCK is required. Run tools/scripts/regenerate-locks.sh and commit requirements/."
            exit 1
          fi
          pip install -r "$LOCK"
          pip install -e . --no-deps
      - name: Run pipeline tests
        run: |
          pytest tests/unit/pipeline/ -v

  # Test example source
  test-example:
    needs: changes
    if: ${{ needs.changes.outputs.example == 'true' }}
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure pip via JFrog proxy
        uses: ./.github/actions/configure-jfrog-pypi
      - name: Install dependencies
        run: |
          LOCK="requirements/root.txt"
          if [ ! -f "$LOCK" ]; then
            echo "::error title=Missing lock::$LOCK is required. Run tools/scripts/regenerate-locks.sh and commit requirements/."
            exit 1
          fi
          pip install -r "$LOCK"
          pip install -e . --no-deps
      - name: Run example tests
        run: |
          pytest tests/unit/sources/example/ -v

  # Test community connector tool
  test-community-connector:
    needs: changes
    if: ${{ needs.changes.outputs.community_connector == 'true' }}
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure pip via JFrog proxy
        uses: ./.github/actions/configure-jfrog-pypi
      - name: Install dependencies
        run: |
          LOCK="requirements/tools.txt"
          if [ ! -f "$LOCK" ]; then
            echo "::error title=Missing lock::$LOCK is required. Run tools/scripts/regenerate-locks.sh and commit requirements/."
            exit 1
          fi
          pip install -r "$LOCK"
          pip install -e ./tools/community_connector --no-deps
      - name: Run community connector tests
        run: |
          cd tools/community_connector
          pytest tests/ -v

  # Test source connectors (per-source, triggered by source/test/utils changes)
  test-source:
    needs: changes
    if: ${{ needs.changes.outputs.sources != '[]' }}
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    strategy:
      matrix:
        source: ${{ fromJson(needs.changes.outputs.sources) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.10"
      - name: Configure pip via JFrog proxy
        uses: ./.github/actions/configure-jfrog-pypi
      - name: Install dependencies
        env:
          # Read matrix value via env to prevent shell injection from source
          # directory names (transitively PR-author controlled).
          SOURCE: ${{ matrix.source }}
        run: |
          SOURCE_DIR="src/databricks/labs/community_connector/sources/${SOURCE}"
          LOCK="requirements/sources.txt"
          if [ ! -f "$LOCK" ]; then
            echo "::error title=Missing lock::$LOCK is required. Run tools/scripts/regenerate-locks.sh and commit requirements/."
            exit 1
          fi
          pip install -r "$LOCK"
          pip install -e . --no-deps
          if [ -f "$SOURCE_DIR/pyproject.toml" ]; then
            pip install -e "$SOURCE_DIR" --no-deps
          fi
      - name: Run ${{ matrix.source }} tests
        env:
          SOURCE: ${{ matrix.source }}
        run: |
          IGNORE_FLAGS=""
          EXCLUDE_FILE=".github/workflows/test_exclude.txt"
          if [ -f "$EXCLUDE_FILE" ]; then
            while IFS= read -r line; do
              # Skip comments and empty lines
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${line// }" ]] && continue
              # Add --ignore for excluded tests in this source's directory
              if [[ "$line" == tests/unit/sources/${SOURCE}/* ]]; then
                IGNORE_FLAGS="$IGNORE_FLAGS --ignore=$line"
              fi
            done < "$EXCLUDE_FILE"
          fi
          echo "Ignore flags: $IGNORE_FLAGS"
          pytest "tests/unit/sources/${SOURCE}/" $IGNORE_FLAGS -v

  # Required merge gate. Branch protection requires `Tests / summary`.
  # `if: always()` so this fires even when upstream jobs are skipped
  # (no relevant files changed) or fail. We treat `skipped` as a pass
  # because matching-paths logic in `changes` legitimately skips entire
  # sub-suites on PRs that don't touch their files. Anything else
  # (failure, cancelled) is a hard fail.
  summary:
    if: always()
    needs:
      - changes
      - test-libs
      - test-pipeline
      - test-example
      - test-community-connector
      - test-source
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Aggregate job results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "Per-job results:"
          echo "$RESULTS" | jq -r 'to_entries[] | "  \(.key): \(.value.result)"'
          echo
          FAILED=$(echo "$RESULTS" | jq -r '
            to_entries
            | map(select(.value.result != "success" and .value.result != "skipped"))
            | .[].key
          ')
          if [ -n "$FAILED" ]; then
            echo "::error::Required jobs did not pass:"
            echo "$FAILED"
            exit 1
          fi
          echo "All Tests jobs passed or were skipped."
